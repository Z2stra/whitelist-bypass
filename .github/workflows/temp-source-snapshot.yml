name: Temporary creator source snapshot

on:
  pull_request:
    paths:
      - "creator-app/**"
      - "PRODUCT.md"
      - "CHANGELOG.md"
      - ".github/workflows/temp-source-snapshot.yml"
  push:
    branches:
      - agent/separate-headless-events
    paths:
      - ".github/workflows/temp-source-snapshot.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: creator-source-${{ github.sha }}
          retention-days: 1
          include-hidden-files: true
          path: |
            creator-app/**
            PRODUCT.md
            CHANGELOG.md
