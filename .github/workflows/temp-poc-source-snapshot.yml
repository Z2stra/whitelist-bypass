name: Temporary POC source snapshot

on:
  pull_request:
    paths:
      - ".github/workflows/temp-poc-source-snapshot.yml"
  push:
    branches:
      - agent/add-vk-poc-only-handler
    paths:
      - ".github/workflows/temp-poc-source-snapshot.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: poc-source-${{ github.sha }}
          retention-days: 1
          include-hidden-files: true
          path: |
            creator-app/**
            PRODUCT.md
            CHANGELOG.md
            docs/poc/wlb-poc1.md
