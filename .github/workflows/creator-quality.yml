name: Creator quality

on:
  pull_request:
    paths:
      - "creator-app/**"
      - ".github/workflows/creator-quality.yml"
  push:
    branches:
      - "agent/**"
    paths:
      - "creator-app/**"
      - ".github/workflows/creator-quality.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: creator-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  creator:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: creator-app/package-lock.json

      - name: Install dependencies
        working-directory: creator-app
        run: npm ci --no-audit --no-fund

      - name: Build
        working-directory: creator-app
        run: npm run build

      - name: Static type check
        working-directory: creator-app
        run: npm run lint

      - name: Unit and regression tests
        working-directory: creator-app
        run: npm test

      - name: Configure Electron sandbox helper
        working-directory: creator-app
        shell: bash
        run: |
          sudo chown root:root node_modules/electron/dist/chrome-sandbox
          sudo chmod 4755 node_modules/electron/dist/chrome-sandbox
          test "$(stat -c '%U:%G %a' node_modules/electron/dist/chrome-sandbox)" = "root:root 4755"

      - name: Electron renderer isolation smoke test
        working-directory: creator-app
        shell: bash
        run: |
          set -o pipefail
          xvfb-run -a npm run smoke:electron 2>&1 | tee electron-smoke.log

      - name: Upload Electron smoke diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: creator-smoke-${{ github.sha }}
          retention-days: 7
          if-no-files-found: warn
          path: creator-app/electron-smoke.log
