name: Temporary apply and verify protected settings

on:
  pull_request:
    paths:
      - ".github/workflows/temp-secret-source-snapshot.yml"
      - ".github/patches/protected-settings*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: protected-settings-publisher
  cancel-in-progress: true

jobs:
  apply-test-commit:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.ref == 'agent/protect-creator-secrets'
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout protected-settings branch
        uses: actions/checkout@v4
        with:
          ref: agent/protect-creator-secrets
          fetch-depth: 0

      - name: Reconstruct and verify reviewed patch
        shell: bash
        run: |
          set -euo pipefail
          cat \
            .github/patches/protected-settings.part-00 \
            .github/patches/protected-settings.part-01 \
            .github/patches/protected-settings.part-02 \
            .github/patches/protected-settings.part-03 \
            .github/patches/protected-settings.part-04 \
            .github/patches/protected-settings.part-05 \
            .github/patches/protected-settings.part-06 \
            .github/patches/protected-settings.part-07-0 \
            .github/patches/protected-settings.part-07-1 \
            .github/patches/protected-settings.part-07-2 \
            .github/patches/protected-settings.part-07-3 \
            .github/patches/protected-settings.part-08-0 \
            .github/patches/protected-settings.part-08-1 \
            .github/patches/protected-settings.part-08-2 \
            .github/patches/protected-settings.part-08-3 \
            .github/patches/protected-settings.part-09-0 \
            .github/patches/protected-settings.part-09-1 \
            .github/patches/protected-settings.part-09-2 \
            .github/patches/protected-settings.part-09-3 \
            .github/patches/protected-settings.part-10 \
            > /tmp/protected-settings-v1.patch.gz.b64

          echo "4c9869f5ab731dc65d87d628e501bc4a6483b1c3e691ebca44c412ff417d564f  /tmp/protected-settings-v1.patch.gz.b64" | sha256sum --check
          base64 --decode /tmp/protected-settings-v1.patch.gz.b64 | gzip -dc > /tmp/protected-settings-v1.patch
          echo "74b664e92410829c3025f779f5e4d192141cc0f0f8759b1ee0e9f7a59a76f439  /tmp/protected-settings-v1.patch" | sha256sum --check
          git apply --check /tmp/protected-settings-v1.patch
          git apply /tmp/protected-settings-v1.patch
          rm -f .github/patches/protected-settings*
          rm -f .github/workflows/temp-secret-source-snapshot.yml

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: creator-app/package-lock.json

      - name: Install dependencies
        working-directory: creator-app
        run: npm ci --no-audit --no-fund

      - name: Build
        working-directory: creator-app
        run: npm run build

      - name: Static type check
        working-directory: creator-app
        run: npm run lint

      - name: Unit and regression tests
        working-directory: creator-app
        run: npm test

      - name: Configure Electron sandbox helper
        working-directory: creator-app
        shell: bash
        run: |
          sudo chown root:root node_modules/electron/dist/chrome-sandbox
          sudo chmod 4755 node_modules/electron/dist/chrome-sandbox
          test "$(stat -c '%U:%G %a' node_modules/electron/dist/chrome-sandbox)" = "root:root 4755"

      - name: Electron renderer isolation smoke
        working-directory: creator-app
        run: xvfb-run -a npm run smoke:electron

      - name: Stage and verify exact scope
        id: scope
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          BASE_SHA=6213a7428de02ec4cc7e655e7486d8a7c1aef949
          git add -A
          git diff --cached --check
          mkdir -p /tmp/protected-settings-ci
          git diff --cached --name-only "$BASE_SHA" | sort | tee /tmp/protected-settings-ci/actual-files.txt

          cat > /tmp/protected-settings-ci/expected-files.txt <<'FILES'
          .github/workflows/creator-quality.yml
          CHANGELOG.md
          PRODUCT.md
          creator-app/index.html
          creator-app/package.json
          creator-app/src/constants.ts
          creator-app/src/main/cookie-domain-policy.test.ts
          creator-app/src/main/cookie-domain-policy.ts
          creator-app/src/main/electron-protected-settings.ts
          creator-app/src/main/ephemeral-cookie-file.test.ts
          creator-app/src/main/ephemeral-cookie-file.ts
          creator-app/src/main/index.ts
          creator-app/src/main/ipc.ts
          creator-app/src/main/protected-settings-smoke-policy.test.ts
          creator-app/src/main/protected-settings-smoke-policy.ts
          creator-app/src/main/protected-settings-smoke.ts
          creator-app/src/main/protected-settings-static.test.ts
          creator-app/src/main/protected-settings.test.ts
          creator-app/src/main/protected-settings.ts
          creator-app/src/main/safe-storage-policy.ts
          creator-app/src/main/tab-manager.ts
          creator-app/src/preload/index.ts
          creator-app/src/renderer/dom.ts
          creator-app/src/renderer/index.ts
          creator-app/src/renderer/protected-settings-form.test.ts
          creator-app/src/renderer/protected-settings-form.ts
          creator-app/src/renderer/protected-settings-manager.test.ts
          creator-app/src/renderer/protected-settings-migration.test.ts
          creator-app/src/renderer/protected-settings-migration.ts
          creator-app/src/renderer/tab-manager.ts
          creator-app/src/types.ts
          creator-app/styles/main.css
          creator-app/tools/smoke-protected-storage.js
          docs/security/control-plane-threat-model.md
          docs/security/electron-trust-boundary.md
          docs/security/protected-settings-and-cookies.md
          FILES

          sort -o /tmp/protected-settings-ci/expected-files.txt /tmp/protected-settings-ci/expected-files.txt
          diff -u /tmp/protected-settings-ci/expected-files.txt /tmp/protected-settings-ci/actual-files.txt
          test "$(wc -l < /tmp/protected-settings-ci/actual-files.txt)" -eq 36
          echo "5bcf8f459b75d091a1ef5c16808544d66a28df6a2616dbe373ce0814e408d092  /tmp/protected-settings-ci/actual-files.txt" | sha256sum --check

          if git diff --cached --numstat "$BASE_SHA" | grep -q $'^-	-	'; then
            echo "Binary file unexpectedly present" >&2
            exit 1
          fi
          git status --short > /tmp/protected-settings-ci/status.txt
          git write-tree > /tmp/protected-settings-ci/tree.txt

      - name: Upload scope diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: protected-settings-scope-${{ github.sha }}
          retention-days: 2
          if-no-files-found: warn
          path: /tmp/protected-settings-ci/**

      - name: Stop on scope failure
        if: steps.scope.outcome == 'failure'
        run: exit 1

      - name: Commit verified production tree
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "security(creator): protect credentials and cookie artifacts"
          git push origin HEAD:agent/protect-creator-secrets
