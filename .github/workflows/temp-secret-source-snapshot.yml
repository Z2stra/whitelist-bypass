name: Temporary protected-settings source snapshot

on:
  push:
    branches:
      - agent/protect-creator-secrets
    paths:
      - ".github/workflows/temp-secret-source-snapshot.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: protected-settings-source-${{ github.sha }}
          retention-days: 1
          include-hidden-files: true
          path: |
            creator-app/**
            PRODUCT.md
            CHANGELOG.md
            docs/security/**
