name: Temporary current-main snapshot

on:
  pull_request:
    paths:
      - ".github/workflows/temp-secret-source-snapshot.yml"
  push:
    branches:
      - agent/protect-creator-secrets
    paths:
      - ".github/workflows/temp-secret-source-snapshot.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snapshot-main:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.ref == 'agent/protect-creator-secrets'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout current main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Record source commit
        shell: bash
        run: git rev-parse HEAD > CURRENT_MAIN_COMMIT.txt

      - name: Upload current main source
        uses: actions/upload-artifact@v4
        with:
          name: current-main-source-${{ github.sha }}
          retention-days: 1
          include-hidden-files: true
          if-no-files-found: error
          path: |
            .
            !.git/**
