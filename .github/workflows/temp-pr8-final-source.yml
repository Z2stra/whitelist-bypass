name: Temporary final PR8 source snapshot

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/temp-pr8-final-source.yml"

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/pr8-final-audit-source
      - uses: actions/upload-artifact@v4
        with:
          name: pr8-final-source-${{ github.sha }}
          retention-days: 1
          include-hidden-files: true
          path: |
            creator-app/**
            PRODUCT.md
            CHANGELOG.md
            docs/security/**
            .github/workflows/creator-quality.yml
