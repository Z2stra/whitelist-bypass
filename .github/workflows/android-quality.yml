name: Android quality

on:
  pull_request:
    paths:
      - "android-app/**"
      - ".github/workflows/android-quality.yml"
  push:
    branches:
      - "agent/**"
    paths:
      - "android-app/**"
      - ".github/workflows/android-quality.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 36
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Make Gradle wrapper executable
        working-directory: android-app
        run: chmod +x gradlew

      - name: Unit tests
        working-directory: android-app
        run: ./gradlew --no-daemon test

      - name: Android lint
        id: lint
        continue-on-error: true
        working-directory: android-app
        run: ./gradlew --no-daemon lintDebug

      - name: Assemble debug APK
        working-directory: android-app
        run: ./gradlew --no-daemon assembleDebug

      - name: Upload Android reports and APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-quality-${{ github.sha }}
          if-no-files-found: warn
          path: |
            android-app/app/build/reports/**
            android-app/app/build/outputs/apk/debug/*.apk
            android-app/app/build/test-results/**

      - name: Fail if lint failed
        if: steps.lint.outcome == 'failure'
        run: exit 1
