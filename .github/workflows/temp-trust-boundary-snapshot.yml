name: Temporary apply verified trust-boundary patch

on:
  pull_request:
    paths:
      - ".github/workflows/temp-trust-boundary-snapshot.yml"
  push:
    branches:
      - agent/harden-electron-trust-boundary
    paths:
      - ".github/workflows/temp-trust-boundary-snapshot.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout working branch
        uses: actions/checkout@v4
        with:
          ref: agent/harden-electron-trust-boundary
          fetch-depth: 0

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: creator-app/package-lock.json

      - name: Reconstruct and validate patch
        shell: bash
        run: |
          while read -r expected file; do
            actual="$(git hash-object "$file")"
            echo "$file expected=$expected actual=$actual"
            test "$actual" = "$expected"
          done <<'HASHES'
          f2cfad2ce5b9271e39b69c8c6153f40c922b05b9 .github/patches/trust-boundary.part-aa
          d81c064b061347f17b2b1177dc816d93310f329a .github/patches/trust-boundary.part-ab
          4045eb0526b87435cf73dcf214d9addcab1de7e0 .github/patches/trust-boundary.part-ac
          544325ebb9da0d8af951a53cf58cb929fcc52b7f .github/patches/trust-boundary.part-ad
          42338a198ac8ee463c04d719a199dc27b3dccce8 .github/patches/trust-boundary.part-ae
          e586e4c9503c8e3109db117a5b99c4a07f078bfc .github/patches/trust-boundary.part-af
          a72f1e68c6ca9f66225f7b4f65167ef908f492af .github/patches/trust-boundary.part-ag
          HASHES
          cat .github/patches/trust-boundary.part-* | base64 --decode > /tmp/trust-boundary.patch
          echo "9a0ba1480311d790c0ed688fe57d92996f5a5ceb3dc5a1467b5c40b3493ab2f8  /tmp/trust-boundary.patch" | sha256sum --check
          git apply --check /tmp/trust-boundary.patch
          git apply /tmp/trust-boundary.patch
          rm -f .github/patches/trust-boundary.part-*
          rm -f .github/workflows/temp-trust-boundary-snapshot.yml

      - name: Install and verify Creator
        working-directory: creator-app
        run: |
          npm ci --no-audit --no-fund
          npm run build
          npm run lint
          npm test
          xvfb-run --auto-servernum npm run smoke:electron

      - name: Commit verified change
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "security(creator): harden Electron trust boundary"
          git push origin HEAD:agent/harden-electron-trust-boundary
